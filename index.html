<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Sign Up</title>

<link rel="shortcut icon" href="IMAGES/logo.png" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  

<div class="bg-layer"></div>
<div class="grid-bg"></div>

<div class="wrapper">
  <div class="card">

    <div class="brand">
      <img src="IMAGES/logo.png" alt="ORVIX" class="logo-img">
      <span class="brand-name">ORVIX</span>
    </div>

    <p class="brand-tag">
      <span class="t-s">Connect.</span>
      <span class="t-c">Secure.</span>
      <span class="t-a">Access.</span>
    </p>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-login">Login</button>
      <button class="tab-btn" id="tab-signup">Sign Up</button>
    </div>

    <div class="form-panel active" id="panel-login">

      <div class="field-group">
        <label>Email</label>
        <div class="inp-wrap">
          <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 7 10 7 10-7"/>
          </svg>
          <input type="email" id="login-email" placeholder="Enter your email">
        </div>
      </div>

      <div class="field-group">
        <label>Password</label>
        <div class="inp-wrap">
          <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="lpass" placeholder="Enter your password">
          <button class="eye-btn" type="button"></button>
        </div>
      </div>

      <div class="row-flex">
        <a href="#" class="link-text">Forgot Password?</a>
      </div>

      <button class="btn-primary" id="login-btn">LOGIN</button>

      <p class="switch-text">
        Don't have an account?
        <a href="#" class="link-text" id="go-signup">Sign up</a>
      </p>

    </div>

    <div class="form-panel" id="panel-signup">


      <div class="field-group">
        <label>Email</label>
        <div class="inp-wrap">
          <svg class="inp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 7 10 7 10-7"/>
          </svg>
          <input type="email" id="signup-email" placeholder="Enter your email">
        </div>
      </div>

      <div class="field-group">
        <label>Password</label>
        <div class="inp-wrap">
          <input type="password" id="spass" placeholder="Create password">
          <button class="eye-btn" type="button"></button>
        </div>
      </div>


     
      <button class="btn-primary" id="signup-btn">SIGN UP</button>

      <p class="switch-text">
        Already have an account?
        <a href="#" class="link-text" id="go-login">Login</a>
      </p>

    </div>

  </div>
</div>



<script type="module" src="Script.js" defer></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
