<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="shortcut icon" href="IMAGES/logo.png" type="image/x-icon">
  <link rel="stylesheet" href="Dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

  <aside id="sidebar">
    <div class="dot">
      <div class="imd">
        <img src="IMAGES/logo.png" alt="Logo">
        <span>ORVIX</span>
      </div>
      <span class="dots" id="open"><i class="fa-solid fa-bars"></i></span>
    </div>

    <div class="items">
      <h4><i class="fa-regular fa-user"></i><span>Profile</span></h4>
      <h4><i class="fa-solid fa-signs-post"></i><span>Posts</span></h4>
      <h4><i class="fa-solid fa-gear"></i><span>Setting</span></h4>
    </div>

    <div class="logout">
      <h4><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Logout</span></h4>
    </div>
  </aside>

  <main>
    <section class="wel" id="wel">  
      <div class="wel-text">
        <h2>Welcome TO ORVIX</h2>
        <p>Connect, <span class="f">share posts</span>, <span class="S">upload media</span>, and <span class="L">explore the ORVIX community</span>.</p>
      </div>
      <button class="post-btn" id="postbtn">
        <i class="fa-solid fa-plus"></i>
        Create Your first Post
      </button>
    </section>
  </main>

  <div class="postparent" id="postModal">
    <div class="postbox">
      
    </div>
  </div>

  <script src="Dashboard.js"></script>
</body>
</html>
