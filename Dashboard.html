<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="shortcut icon" href="IMAGES/logo.png" type="image/x-icon">
  <link rel="stylesheet" href="Dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>


 <div class="mas">

 
  <aside id="sidebar">
    <div class="dot">
      <div class="imd">
        <img src="IMAGES/logo.png" alt="Logo">
        <span>ORVIX</span>
      
      </div>
        <span class="dots" id="open"><i class="fa-solid fa-bars"></i></span>
      
    </div>

    <div class="items">
        <abbr title="Post"><h4 class="active"><i class="fa-solid fa-signs-post"></i><span>Posts</span></h4></abbr>
      <abbr title="User Profile"><h4><i class="fa-regular fa-user"></i><span>Profile</span></h4></abbr>
      <abbr title="Add post"><h4 class="pa" id="pbtn"><i class="fa-solid fa-plus"></i><span>Upload</span></h4></abbr>
   
    <abbr title="Setting"><h4><i class="fa-solid fa-gear"></i><span>Setting</span></h4></abbr>
    </div>

    <div class="logout">
   <abbr title="Logout"><h4 id="logout"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Logout</span></h4></abbr>
    </div>
  </aside>
  
    



  <main>
    <section class="wel" id="wel">  
      <div class="wel-text">
        <h2>Welcome TO ORVIX</h2>
        <p>Connect, <span class="f">share posts</span>, <span class="S">upload media</span>, and <span class="L">explore the ORVIX community</span>.</p>
      </div>
      <button class="post-btn" id="postbtn">
        <i class="fa-solid fa-plus"></i>
        Create Your first Post
      </button>
    </section>
     <div id="feeds"></div>
  </main>
</div>

 

  <div id="postModal" class="postparent">
  <div class="postbox"></div>
</div>


  <script type="module" src="Dashboard.js" defer></script>
</body>
</html>
